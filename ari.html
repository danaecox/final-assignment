<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ari</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background-color: white;
      font-family: 'Bungee', sans-serif;
      text-align: center;
      padding-top: 40px;
    }

    img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .line {
      font-size: 3.5rem;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }

    /* ARI, 28 */
    .line1 {
      animation: typing1 1.6s steps(20, end) forwards;
    }

    /* CAUSE OF HEARTBREAK */
    .line2 {
      margin-top: 20px;
      animation: typing2 1.6s steps(30, end) forwards;
      animation-delay: 1.8s; /* short pause */
    }

    /* DADDY ISSUES */
    .line3 {
      margin-top: 10px;
      animation: typing3 1.8s steps(40, end) forwards;
      animation-delay: 3.6s; /* shorter second pause */
    }

    @keyframes typing1 {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes typing2 {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes typing3 {
      from { width: 0; }
      to { width: 100%; }
    }

    a {
      color: #111;
      text-decoration: none;
      transition: 0.2s;
    }

    a:hover {
      color: blue;
    }

    .back {
      margin-top: 40px;
      font-size: 0.9rem;
      text-decoration: none;
      color: #111;
      opacity: 0.8;
    }

    .back:hover {
      color: blue;
      opacity: 1;
    }
  </style>
</head>

<body>

  <img src="ari.jpg" alt="Ari">

  <!-- Line 1 -->
  <div class="line line1">ARI, 28</div>

  <!-- Line 2 -->
  <div class="line line2">CAUSE OF HEARTBREAK:</div>

  <!-- Line 3 (clickable) -->
  <div class="line line3">
    <a href="daddy-issues.html">DADDY ISSUES</a>
  </div>

  <a class="back" href="page2.html">← Back</a>

</body>
</html>
