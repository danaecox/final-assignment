<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tyler Room</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 60px 20px;
  background: white;
  font-family: "Crimson Text", serif;
  color: #111;
}

/* CHAT */
.chat {
  max-width: 800px;
  margin: 0 auto;
  font-size: 1.4rem;
  line-height: 1.7;
}

/* MESSAGE BASE */
.msg {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.6s ease;
  margin: 30px 0;
}

.msg.show {
  opacity: 1;
  transform: translateY(0);
}

/* SIDES */
.left { text-align: left; margin-right: 20%; }
.right { text-align: right; margin-left: 20%; }

/* CHOICE UI */
.choices {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 40px 0;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.6s ease;
}

.choices.show {
  opacity: 1;
  transform: translateY(0);
}

.choice-btn {
  font-family: "Bungee", sans-serif;
  font-size: 14px;
  background: none;
  border: 1px solid #111;
  padding: 10px 18px;
  cursor: pointer;
  transition: 0.2s;
}

.choice-btn:hover {
  color: #ff0088;
  border-color: #ff0088;
}

/* BACK */
.back {
  display: block;
  text-align: center;
  margin-top: 100px;
  font-family: "Bungee", sans-serif;
  color: #111;
  text-decoration: none;
}

.back:hover {
  color: #ff0088;
}

</style>
</head>

<body>

<div class="chat" id="chat">

  <div class="msg left show">Tyler sits opposite you on the tram.</div>

  <div class="msg left">He doesn’t look up from the window.</div>

  <div class="msg left">“You getting off at the next stop?”</div>

  <!-- CHOICE APPEARS HERE -->
  <div class="choices" id="choices">
    <button class="choice-btn" onclick="choose('yes')">YES</button>
    <button class="choice-btn" onclick="choose('no')">NO</button>
  </div>

</div>

<a class="back" href="#">← Back</a>

<script>

const chat = document.getElementById("chat");
const choices = document.getElementById("choices");

/* show choices after delay */
setTimeout(() => {
  choices.classList.add("show");
}, 1500);

/* HANDLE USER CHOICE */
function choose(answer) {

  // hide buttons
  choices.style.display = "none";

  // USER MESSAGE
  const userMsg = document.createElement("div");
  userMsg.className = "msg right show";

  if (answer === "yes") {
    userMsg.textContent = "Yeah.";
  } else {
    userMsg.textContent = "No.";
  }

  chat.appendChild(userMsg);

  // TYLER RESPONSE
  setTimeout(() => {

    const tylerReply = document.createElement("div");
    tylerReply.className = "msg left";

    if (answer === "yes") {
      tylerReply.textContent = "Didn’t think you’d stay.";
    } else {
      tylerReply.textContent = "You never do anyway.";
    }

    chat.appendChild(tylerReply);

    setTimeout(() => {
      tylerReply.classList.add("show");
    }, 200);

  }, 900);
}

</script>

</body>
</html>
