<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tyler Room</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 60px 20px;
  font-family: "Crimson Text", serif;
  background: white;
  color: #111;
}

.chat {
  max-width: 760px;
  margin: 0 auto;
  font-size: 1.25rem;
  line-height: 1.75;
}

.msg {
  opacity: 0;
  transform: translateY(8px);
  transition: 0.5s ease;
  margin: 26px 0;
}

.msg.show {
  opacity: 1;
  transform: translateY(0);
}

.left { text-align: left; margin-right: 20%; }
.right { text-align: right; margin-left: 20%; }

.center {
  text-align: center;
  margin: 32px 0;
  font-weight: 700;
}

/* =========================
   FIXED NEXT BUTTON (BOTTOM)
========================= */

.next-btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);

  padding: 10px 16px;

  font-family: "Bungee", sans-serif;
  font-size: 13px;

  background: white;
  border: 1px solid #111;
  color: #111;

  cursor: pointer;
  transition: 0.2s ease;

  z-index: 9999;
}

.next-btn:hover {
  color: #ff0088;
  border-color: #ff0088;
}

/* choices */
.choices {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin: 30px 0;
}

.choice-btn {
  font-family: "Bungee", sans-serif;
  font-size: 13px;
  background: none;
  border: 1px solid #111;
  padding: 10px 14px;
  cursor: pointer;
}

.choice-btn:hover {
  color: #ff0088;
  border-color: #ff0088;
}

/* name input */
.name-input {
  display: none;
  text-align: center;
  margin: 40px 0;
}

.name-input input {
  font-family: "Crimson Text";
  font-size: 1.2rem;
  border: none;
  border-bottom: 1px solid #111;
  text-align: center;
  outline: none;
  padding: 6px;
}

.name-input button {
  margin-top: 12px;
  font-family: "Bungee";
  border: 1px solid #111;
  background: none;
  padding: 8px 12px;
  cursor: pointer;
}

.continue {
  display: none;
  text-align: center;
  margin-top: 80px;
}

.continue a {
  font-family: "Bungee";
  color: #111;
  text-decoration: none;
}

.continue a:hover {
  color: #ff0088;
}

</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="name-input" id="nameInput">
  <input id="nameField" placeholder="your name">
  <br>
  <button onclick="submitName()">continue</button>
</div>

<div class="continue" id="continueBtn">
  <a href="tyler2.html">CONTINUE</a>
</div>

<script>

const chat = document.getElementById("chat");
const nameInput = document.getElementById("nameInput");
const continueBtn = document.getElementById("continueBtn");

let userName = "kid";

let nextBtn = null;

/* =========================
   CORE
========================= */

function add(text, side="left") {
  const el = document.createElement("div");
  el.className = `msg ${side}`;
  el.textContent = text;

  chat.appendChild(el);
  setTimeout(() => el.classList.add("show"), 80);

  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

/* FIXED NEXT BUTTON */
function next() {
  return new Promise(resolve => {

    if (nextBtn) nextBtn.remove();

    nextBtn = document.createElement("button");
    nextBtn.className = "next-btn";
    nextBtn.textContent = "NEXT";

    nextBtn.onclick = () => {
      nextBtn.remove();
      nextBtn = null;
      resolve();
    };

    document.body.appendChild(nextBtn);
  });
}

/* choices */
function choices(options, cb) {
  const wrap = document.createElement("div");
  wrap.className = "choices";

  options.forEach(o => {
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.textContent = o.label;

    b.onclick = () => {
      wrap.remove();
      cb(o.value);
    };

    wrap.appendChild(b);
  });

  chat.appendChild(wrap);
}

/* =========================
   SCRIPT
========================= */

async function start() {

  add("You take a seat down near the back of the tram. Tyler looks like the sort of person mothers would tell their children to steer clear of, but you're trying not to be so judgemental these days. You settle into your spot and your eyes take in the carriage. He looks at you and you know whats coming. You want to be a good person but you’re annoyed at him for abusing your conscious lack of judgement.", "center");
  await next();

  add("Hey, kid!", "left");
  await next();

  add("Me?", "right");
  await next();

  add("Yes you. Who the hell else is around?", "left");
  await next();

  add("Yeah?", "right");
  await next();

  add("You ever lost something you love, kid?", "left");

  choices([
    { label: "YES", value: "yes" },
    { label: "NO", value: "no" }
  ], loveChoice);
}

async function loveChoice(v) {

  add(v === "yes" ? "Yeah." : "No.", "right");

  if (v === "yes") {
    await next();
    add("Yeah yeah, I knew it. You know why? I can see it in your eyes, you’ve got depth, you know pain.", "left");
  } else {
    await next();
    add("Oh good good. You’re young, you’re healthy, you’re gonna be alright.", "left");
  }

  await next();

  add("But let me tell you, life's hard man. I think that's the only way to put it.", "left");
  await next();

  add("His sadness is palpable. Any fear you have is more or less absolved by curiosity.", "center");
  await next();

  add("You reckon?", "right");
  await next();

  add("Oh yeah, life is unstable, you know? Unpredictable. Ya this, then ya that. I was a junior chief in the Navy, then I was a dish pig, I was sleepin on the street for a bit, then I was workin in a lighthouse, creepy stuff mate, some nights I’d have sworn the streets were safer.", "left");
  await next();

  add("Anyway, it’s all big stuff, life is good, then it’s bad, and there’s good parts of the bad and bad parts of the good. And it doesn’t matter if you like that or not cause it’s gonna happen. You don’t get travel sick do ya?", "left");

  choices([
    { label: "YES", value: "sick_yes" },
    { label: "NO", value: "sick_no" }
  ], sickChoice);
}

async function sickChoice(v) {

  if (v === "sick_yes") {
    add("Yeah, I do actually.", "right");
    await next();
    add("Well then, you know that feeling when your heads all spinnin, your stomach is fucken flipping around on itself, and no ground feels solid?", "left");
  } else {
    add("Nah, I don't.", "right");
    await next();
    add("Yeah, haha, I can tell by the way you’re sittin, facing the wrong direction. It’s not gonna last, kid.", "left");
  }

  await next();

  add("Soon life is gonna make you sick, and they’re gonna try and sell you a bunch of cures, but there's only one, and you're gonna wanna remember this.", "left");
  await next();

  add("The tram halts at it’s stop and Tyler pauses for a moment too long.", "center");
  await next();

  add("What is it?", "right");
  await next();

  add("Consistency.", "left");
  await next();

  add("Consistency.", "right");
  await next();

  add("Tried and true. Be it a person, be it a place, be it ya fucken peanut butter.", "left");
  await next();

  add("...", "right");
  await next();

  add("Peanut butter?", "right");
  await next();

  add("Ohhhh, kid. Thirteen years of buying the shit. Even when I was dirt broke I found a way. No added salt, no added sugar, best thing for ya. Ate it every morning on a bit of toast. There were months that I hated it, got so boring it made me gag. It didn’t matter. It’s the only thing that kept me sane. I tell ya. They sell you the most sophisticated shit, but this is the stuff that works.", "left");
  await next();

  add("Right.", "right");
  await next();

  add("Discontinued!", "left");
  await next();

  add("Just like that, gone from the shelves, no warnin, nothin. Looked it up, they don’t even produce it anymore.", "left");
  await next();

  add("That sucks I’m sorry.", "right");
  await next();

  add("Oh, don’t be, kid. World’s going to shit, but that's not your fault, remember that.", "left");
  await next();

  add("Hah, well thanks, that's a relief.", "right");
  await next();

  add("Tyler reaches for the button haphazardly.", "center");
  await next();

  add("My stop. What’s ya name kid?", "left");

  document.getElementById("nameInput").style.display = "block";
}

function submitName() {

  userName = document.getElementById("nameField").value || "kid";

  nameInput.style.display = "none";

  add(userName, "right");

  setTimeout(() => {
    add(`${userName}. I’m Tyler. Nice talkin to ya.`, "left");

    setTimeout(end, 1600);
  }, 1200);
}

function end() {

  add("He grabs your hand, he doesn’t shake it, he just holds it a bit. By the time he lets go he’s already turned away.", "center");

  setTimeout(async () => {
    await next();

    add("You have something left to say.", "center");
    await next();

    add("Tyler. I think you’ll be okay.", "right");
    await next();

    add("He doesn’t turn back. You’re not sure if he heard you.", "center");

    setTimeout(() => {
      continueBtn.style.display = "block";
    }, 1200);

  }, 800);
}

start();

</script>

</body>
</html>
