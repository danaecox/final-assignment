<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      background-color: white;
    }

    .image-link {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-link img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 12px;
      transition: 0.2s;
    }

    .image-link img:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>

  <!-- JACK -->
  <a href="jack.html" class="image-link">
   <img src="images/jack.png.jpg">
  </a>

  <!-- ARI -->
  <a href="ari.html" class="image-link">
    <img src="ari.jpg" alt="Ari">
  </a>

  <!-- TYLER -->
  <a href="tyler.html" class="image-link">
    <img src="tyler.jpg" alt="Tyler">
  </a>

</body>
</html>
