<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ari Final</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Crimson Text", serif;
  background: white;
  overflow: hidden;
}

#wrapper {
  width: 70%;
  max-width: 760px;
}

#text {
  font-size: 1.05rem;
  line-height: 1.9;
  white-space: pre-wrap;
}

/* FINAL STATE */
.final {
  text-align: center;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
}

.finalLine {
  font-size: 1.4rem;
  font-weight: 600;
  opacity: 0;
  transform: scale(0.95);
  transition: all 1.2s ease;
  margin: 10px 0;
}

.finalLine.show {
  opacity: 1;
  transform: scale(1);
}

#nextButton {
  margin-top: 30px;
  font-family: "Bungee", sans-serif;
  font-size: 14px;
  background: none;
  border: 1px solid #111;
  cursor: pointer;
  padding: 10px 16px;
  opacity: 0;
  transition: 0.4s ease;
}

#nextButton:hover {
  color: #ff0088;
  border-color: #ff0088;
}

#nextButton.show {
  opacity: 1;
}

</style>
</head>

<body>

<div id="wrapper">
  <div id="text"></div>
</div>

<script>

const text = `
PASTE ARI'S FINAL TEXT HERE
`;

const finalLines = [
  "It's okay, Ari.",
  "You're sad."
];

const SPEED = {
  char: 48,
  pause: 320,
  finishHold: 4500
};

const wrapper = document.getElementById("wrapper");
const textEl = document.getElementById("text");

let i = 0;

function type() {

  if (i < text.length) {

    const char = text[i];

    textEl.innerHTML =
      text.slice(0, i) +
      "<span>|</span>";

    i++;

    let delay = SPEED.char;

    if (
      char === "." ||
      char === "!" ||
      char === "?"
    ) {
      delay = SPEED.pause;
    }

    setTimeout(type, delay);

  } else {

    textEl.innerHTML = text;

    setTimeout(
      transition,
      SPEED.finishHold
    );

  }
}

function transition() {

  wrapper.innerHTML = `
    <div class="final">
      <div class="finalLine" id="l1">${finalLines[0]}</div>
      <div class="finalLine" id="l2">${finalLines[1]}</div>
      <button id="nextButton">CONTINUE</button>
    </div>
  `;

  const l1 = document.getElementById("l1");
  const l2 = document.getElementById("l2");
  const btn = document.getElementById("nextButton");

  setTimeout(() => l1.classList.add("show"), 800);
  setTimeout(() => l2.classList.add("show"), 2200);
  setTimeout(() => btn.classList.add("show"), 4200);

  btn.onclick = () => {
    window.location.href = "page2.html";
  };
}

type();

</script>

</body>
</html>
