<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Room 1</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Crimson Text", serif;
}

#wrapper {
  width: 70%;
  max-width: 760px;
}

#text {
  font-size: 1.05rem;
  line-height: 1.9;
  white-space: pre-wrap;
}

#nextButton {
  margin-top: 20px;
  font-family: "Bungee", sans-serif;
  background: none;
  border: none;
  cursor: pointer;
  opacity: 0;
  transition: 0.3s;
}

#nextButton.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="wrapper">
  <div id="text"></div>
</div>

<script>

const text = `
When I lived at home I’d punch the walls. It’s probably still there, who knows dad might’ve patched it up by now. I get mad sometimes.

I took a media class in grade ten or something, thought it would be a joke class. Just watching movies.

We were learning about learned social behaviour through film.

The teacher said: “What do teenage boys do when they’re angry?”

None of us said anything.

She looked around the room real slow.

Then she punched the wall.

Kinda weird watching an older lady do that.
`;

const wrapper = document.getElementById("text");

let i = 0;

function type() {
  if (i < text.length) {
    wrapper.innerHTML = text.slice(0, i) + "<span>|</span>";
    i++;
    setTimeout(type, 25);
  } else {
    wrapper.innerHTML = text;

    const btn = document.createElement("button");
    btn.id = "nextButton";
    btn.textContent = "CONTINUE";

    btn.classList.add("show");

    btn.onclick = () => {
      window.location.href = "instagram1.html";
    };

    document.getElementById("wrapper").appendChild(btn);
  }
}

type();

</script>

</body>
</html>
